---
layout: default
nav_active: blog
---

<article class="blog active" data-page="blog" style="padding-top: 80px;">

  <style>
    .blog-post-content {
      max-width: 100%;
    }
    .blog-post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      display: block;
      margin: 15px auto;
    }
    .blog-post-content figure {
      margin: 20px 0;
      text-align: center;
    }
    .blog-post-content figcaption {
      font-size: 13px;
      color: var(--light-gray-70);
      margin-top: 8px;
    }
    .blog-post-content h3 {
      color: var(--white-2);
      margin-top: 30px;
      margin-bottom: 12px;
      font-size: 1.4em;
    }
    .blog-post-content h4 {
      color: var(--white-2);
      margin-top: 25px;
      margin-bottom: 10px;
      font-size: 1.15em;
    }
    .blog-post-content p {
      margin-bottom: 16px;
      color: var(--light-gray);
      line-height: 1.8;
    }
    .blog-post-content a {
      color: var(--orange-yellow-crayola);
      display: inline;
    }
    .blog-post-content a:hover {
      text-decoration: underline;
    }
    .blog-post-content span {
      display: inline;
    }
    .blog-post-content ul, .blog-post-content ol {
      margin: 10px 0 20px 25px;
      color: var(--light-gray);
      line-height: 1.8;
    }
    .blog-post-content ol {
      list-style-type: decimal;
    }
    .blog-post-content ul {
      list-style-type: disc;
    }
    .blog-post-content li {
      margin-bottom: 12px;
      list-style: inherit;
    }
    .blog-post-content li strong {
      color: var(--white-2);
      display: inline;
    }
    .blog-post-content pre {
      background: #1e1e2e;
      padding: 20px 24px;
      border-radius: 10px;
      overflow-x: auto;
      font-size: 13.5px;
      line-height: 1.7;
      margin: 20px 0;
      color: #cdd6f4;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      white-space: pre-wrap;
      word-wrap: break-word;
      border: 1px solid #313244;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }
    .blog-post-content code {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 0.88em;
      background: #1e1e2e;
      color: #f38ba8;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid #313244;
    }
    /* Basic syntax highlighting for comments, strings, keywords */
    .blog-post-content pre {
      tab-size: 4;
    }
    .syn-cmt { color: #6c7086; font-style: italic; }
    .syn-str { color: #a6e3a1; }
    .syn-kw  { color: #cba6f7; }
    .syn-typ { color: #89b4fa; }
    .syn-fn  { color: #f9e2af; }
    .blog-post-content blockquote {
      border-left: 3px solid var(--orange-yellow-crayola);
      padding: 12px 24px;
      margin: 20px 0;
      color: var(--light-gray-70);
      font-style: italic;
      background: var(--eerie-black-2);
      border-radius: 0 8px 8px 0;
    }
    /* Medium mixtape embed cards */
    .blog-post-content .graf--mixtapeEmbed {
      display: flex;
      align-items: stretch;
      border: 1px solid var(--jet);
      border-radius: 10px;
      overflow: hidden;
      margin: 12px 0;
      background: #1e1e2e;
      transition: border-color 0.2s;
    }
    .blog-post-content .graf--mixtapeEmbed:hover {
      border-color: var(--orange-yellow-crayola);
    }
    .blog-post-content .graf--mixtapeEmbed > a.markup--anchor--mixtapeEmbed-anchor,
    .blog-post-content .graf--mixtapeEmbed > a:first-child {
      flex: 1;
      padding: 16px 20px;
      color: var(--light-gray);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }
    .blog-post-content .graf--mixtapeEmbed strong {
      color: var(--white-2);
      font-size: 15px;
      display: block;
      margin-bottom: 4px;
    }
    .blog-post-content .graf--mixtapeEmbed em {
      color: var(--light-gray-70);
      font-size: 13px;
      font-style: normal;
      display: block;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .blog-post-content .graf--mixtapeEmbed .mixtapeImage,
    .blog-post-content .graf--mixtapeEmbed > a:last-child:not(:first-child) {
      width: 120px;
      min-width: 120px;
      background-size: cover;
      background-position: center;
      display: block;
    }
    .blog-post-content .graf--mixtapeEmbed .mixtapeImage--empty {
      display: none;
    }
    .blog-post-content hr {
      border: none;
      border-top: 1px solid var(--jet);
      margin: 30px 0;
    }
    .blog-post-content .aspectRatioPlaceholder {
      max-width: 100%;
      overflow: hidden;
    }
    .blog-post-content img[height="1"] {
      display: none;
    }
  </style>

  <nav class="blog-post-nav" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 12px 0; border-bottom: 1px solid var(--jet);">
    <a href="/blog.html" style="color: var(--light-gray-70); text-decoration: none; font-size: 14px; display: inline-flex; align-items: center; gap: 6px;">
      &larr; Back to all posts
    </a>
    {% if page.link %}
    <a href="{{ page.link }}" target="_blank" rel="noopener noreferrer"
       style="color: var(--orange-yellow-crayola); text-decoration: none; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px;">
      Read on Medium &rarr;
    </a>
    {% endif %}
  </nav>

  <header>
    <h2 class="h2 article-title">{{ page.title }}</h2>
    <div class="blog-meta" style="margin-bottom: 25px;">
      <p class="blog-category">{{ page.category }}</p>
      <span class="dot"></span>
      <time datetime="{{ page.date }}">{{ page.date | date: "%b %d, %Y" }}</time>
    </div>
  </header>

  <section class="blog-post-content" style="color: var(--light-gray); line-height: 1.8; font-size: 15px;">
    {{ content }}
  </section>

  <script>
    document.querySelectorAll('.blog-post-content pre').forEach(function(pre) {
      // Work on text content, build highlighted HTML in one pass
      var text = pre.textContent;
      var result = [];
      var i = 0;
      while (i < text.length) {
        // Comments
        if (text[i] === '/' && text[i+1] === '/') {
          var end = text.indexOf('\n', i);
          if (end === -1) end = text.length;
          result.push('<span class="syn-cmt">' + escHtml(text.substring(i, end)) + '</span>');
          i = end;
        }
        // Strings
        else if (text[i] === '"') {
          var j = i + 1;
          while (j < text.length && text[j] !== '"') j++;
          result.push('<span class="syn-str">' + escHtml(text.substring(i, j + 1)) + '</span>');
          i = j + 1;
        }
        // Words
        else if (/[a-zA-Z_]/.test(text[i])) {
          var j = i;
          while (j < text.length && /[a-zA-Z0-9_]/.test(text[j])) j++;
          var word = text.substring(i, j);
          var kws = ['var','new','using','public','private','protected','static','void','class','interface','namespace','return','if','else','try','catch','async','await','get','set'];
          var types = ['Uri','string','int','bool','double','decimal','object','AppDbContext','HttpClient','IServiceCollection'];
          if (kws.indexOf(word) !== -1) {
            result.push('<span class="syn-kw">' + word + '</span>');
          } else if (types.indexOf(word) !== -1) {
            result.push('<span class="syn-typ">' + word + '</span>');
          } else {
            result.push(escHtml(word));
          }
          i = j;
        }
        // Method calls: .Name(
        else if (text[i] === '.' && /[A-Z]/.test(text[i+1])) {
          var j = i + 1;
          while (j < text.length && /[a-zA-Z0-9_]/.test(text[j])) j++;
          result.push('.<span class="syn-fn">' + escHtml(text.substring(i+1, j)) + '</span>');
          i = j;
        }
        else {
          result.push(escHtml(text[i]));
          i++;
        }
      }
      pre.innerHTML = result.join('');
    });
    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Clean up Medium mixtape embed cards
    document.querySelectorAll('.graf--mixtapeEmbed').forEach(function(card) {
      var mainLink = card.querySelector('a.markup--anchor--mixtapeEmbed-anchor') || card.querySelector('a:first-child');
      if (!mainLink) return;

      // Extract title, description, domain from the link
      var strong = mainLink.querySelector('strong');
      var em = mainLink.querySelector('em');
      var title = strong ? strong.textContent.trim() : '';
      var desc = em ? em.textContent.trim() : '';

      // Get domain from href
      var href = mainLink.getAttribute('href') || '';
      var domain = '';
      try { domain = new URL(href).hostname.replace('www.',''); } catch(e) {}

      // Rebuild the link content cleanly
      mainLink.innerHTML = '';
      if (title) {
        var t = document.createElement('strong');
        t.textContent = title;
        mainLink.appendChild(t);
      }
      if (desc) {
        var d = document.createElement('em');
        d.textContent = desc;
        mainLink.appendChild(d);
      }
      if (domain) {
        var s = document.createElement('span');
        s.textContent = domain;
        s.style.cssText = 'font-size:12px;color:var(--light-gray-70);opacity:0.7;';
        mainLink.appendChild(s);
      }
    });
  </script>

</article>
